name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claude Code Tool Manager ${{ github.ref_name }}'
          releaseBody: |
            ## 下载

            | 平台 | 下载 |
            |------|------|
            | Windows | `.msi` 或 `.exe` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Linux | `.deb` 或 `.AppImage` |

            > **macOS 用户**：首次打开未签名应用时，右键点击应用 → 选择「打开」，或运行 `xattr -cr /Applications/Claude\ Code\ Tool\ Manager.app`。

            ## 更新内容

            查看 [提交历史](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})。
          releaseDraft: true
          prerelease: false
          args: --target x86_64-unknown-linux-gnu

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claude Code Tool Manager ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claude Code Tool Manager ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claude Code Tool Manager ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  update-homebrew-tap:
    needs: [build-macos-arm, build-macos-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          TAP_REPO: linhai0872/homebrew-tap
        run: |
          VERSION="${TAG#v}"

          ARM_URL="https://github.com/${REPO}/releases/download/${TAG}/Claude.Code.Tool.Manager_${VERSION}_aarch64.dmg"
          X64_URL="https://github.com/${REPO}/releases/download/${TAG}/Claude.Code.Tool.Manager_${VERSION}_x64.dmg"

          ARM_SHA=$(curl -sL "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)
          X64_SHA=$(curl -sL "$X64_URL" | shasum -a 256 | cut -d' ' -f1)

          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${TAP_REPO}.git" tap-repo
          cd tap-repo

          cat > Casks/claude-code-tool-manager.rb << EOF
          cask "claude-code-tool-manager" do
            version "${VERSION}"

            on_arm do
              url "${ARM_URL}"
              sha256 "${ARM_SHA}"
            end

            on_intel do
              url "${X64_URL}"
              sha256 "${X64_SHA}"
            end

            name "Claude Code Tool Manager"
            desc "GUI for managing Claude Code MCP servers, skills, hooks, and more"
            homepage "https://github.com/${REPO}"

            app "Claude Code Tool Manager.app"

            zap trash: [
              "~/Library/Application Support/com.claude-code-tool-manager.app",
              "~/Library/WebKit/com.claude-code-tool-manager.app",
            ]
          end
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/claude-code-tool-manager.rb
          git diff --cached --quiet && echo "Cask already up to date" && exit 0
          git commit -m "Update claude-code-tool-manager to ${VERSION}"
          git push
